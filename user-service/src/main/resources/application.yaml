server:
  port: ${USER_PORT:8083}

spring:
  application:
    name: user-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: user-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

feign:
  client:
    config:
      auth-service:
        url: http://${AUTH_SERVICE_HOST:auth-service}:8081
        connect-timeout: 3000
        read-timeout: 5000

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-seconds: 2592000
    refresh-token-expiration-seconds: 3888000
  kafka:
    topics:
      user-updated: user.updated
      user-deleted: user.deleted
      user-followed: user.followed
    partitions: 3
    replicas: 3
  idempotency:
    ttl-seconds: 86400



outbox:
  max-retries: 5
  initial-wait-seconds: 60

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:../firebase-key.json}
  storage-bucket: ${FIREBASE_STORAGE_BUCKET:plant-55586.firebasestorage.app}

logging:
  level:
    com.backend.user_service: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health, info, metrics, prometheus"
  endpoint:
    health:
      show-details: always

internal:
  secret: ${INTERNAL_SECRET:dat112004111111111222222222444444444000000aaaa999}


http:
  pool:
    max-total: 200
    max-per-route: 50
  timeout:
    connect-seconds: 5
    socket-seconds: 10

idempotency:
  cleanup-interval-ms: 21600000