# Test Profile for Notification Service
server.port=0
spring.application.name=notification-service

# ===== Database (H2 in-memory) =====
spring.datasource.url=jdbc:postgresql://localhost:5432/notification_test
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect

# ===== Kafka (Embedded in tests) =====
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=notification-service-test
spring.kafka.listener.ack-mode=manual

# ===== Logging =====
logging.level.com.backend.notification_service=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.hibernate=WARN

# ===== Chroma DB (Not needed in tests) =====
chroma.db.path=/tmp/chroma_db_test

# ===== Firebase (Disabled in tests) =====
firebase.credentials.json={}
firebase.storage.bucket=test-bucket
