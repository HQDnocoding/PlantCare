input {
  tcp {
    port => 5000
    codec => json
    tags => ["java-app"]
  }
}

filter {
  # Extract service name from logger name (com.backend.service_name.*)
  if [logger_name] {
    grok {
      match => { "logger_name" => "com\.backend\.(?<service_name>[^.]+)" }
      add_field => { "service" => "%{service_name}" }
    }
  }

  # Parse thread name
  if [thread_name] {
    mutate {
      add_field => { "thread" => "%{thread_name}" }
    }
  }

  # Add timestamp if not present
  if ![@timestamp] {
    date {
      match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS" ]
      target => "@timestamp"
    }
  }

  # Add hostname for tracking
  mutate {
    add_field => { "hostname" => "%{HOSTNAME}" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # Also print to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
