# Test Profile for API Gateway
server.port=0

# ===== JWT Secret (Test) =====
app.jwt.secret=test-secret-key-very-long-for-testing-purposes-minimum-256-bits
app.jwt.access-token-expiration-seconds=900

# ===== Service URLs (Mock in tests) =====
auth-service.url=http://localhost:8080
user-service.url=http://localhost:8081
community-service.url=http://localhost:8082
notification-service.url=http://localhost:8083
scan-service.url=http://localhost:8084
search-service.url=http://localhost:8085

# ===== Logging =====
logging.level.com.backend.api_gateway=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.cloud.gateway=DEBUG

# ===== Gateway Routing (can be overridden in test) =====
spring.cloud.gateway.server.webflux.routes[0].id=health
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8080
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/actuator/health

spring.cloud.gateway.server.webflux.routes[1].id=fallback
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8080
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/fallback/**
