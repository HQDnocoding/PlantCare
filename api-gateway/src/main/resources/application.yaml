      httpclient:
        connect-timeout: 5000
        response-timeout: 200s
      pool:
        max-connections: 200
        acquire-timeout: 3000
        max-idle-time: 30s
        max-life-time: 60s
        eviction-interval: 30s
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-seconds: 2592000
  refresh-token-expiration-seconds: 3888000


# Actuator — exposes /actuator/health for Docker healthcheck
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
    gateway:
      access: read-only
# ── Resilience4j Circuit Breaker ──────────────────────────────────
# Note: /api/v1/diseases (mobile sync) shares chat-cb circuit breaker
#       since it's routed to the same chat-service backend
resilience4j:
  circuitbreaker:
    instances:
      auth-cb:
        sliding-window-size: 50
        failure-rate-threshold: 30        # open circuit if 30% of requests fail
        wait-duration-in-open-state: 60s  # wait 60s before moving to HALF-OPEN
        permitted-number-of-calls-in-half-open-state: 10
        slow-call-duration-threshold: 5s  # requests over 5s count as slow
        slow-call-rate-threshold: 60      # open circuit if 60% of calls are slow

      chat-cb:
        sliding-window-size: 50
        failure-rate-threshold: 30
        wait-duration-in-open-state: 90s  # chat-service is heavier, wait longer
        permitted-number-of-calls-in-half-open-state: 10
        slow-call-duration-threshold: 60s # RAG + CNN + Gemini can be slow (up to 60s)
        slow-call-rate-threshold: 60


      scan-cb:
        sliding-window-size: 50
        failure-rate-threshold: 30
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 10
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 60

      user-cb:
        sliding-window-size: 50
        failure-rate-threshold: 30
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 10
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 60

      community-cb:
        sliding-window-size: 50
        failure-rate-threshold: 30
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 10
        slow-call-duration-threshold: 15s  # Allow for multipart/form-data upload (3+ images)
        slow-call-rate-threshold: 60
      search-cb:
        sliding-window-size: 50
        failure-rate-threshold: 30
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 10
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 60

      notification-cb:
        sliding-window-size: 50
        failure-rate-threshold: 30
        wait-duration-in-open-state: 90s
        permitted-number-of-calls-in-half-open-state: 10
        slow-call-duration-threshold: 60s
        slow-call-rate-threshold: 60
  timelimiter:
    instances:
      auth-cb:
        timeout-duration: 100s
      chat-cb:
        timeout-duration: 180s
      scan-cb:
        timeout-duration: 100s
      user-cb:
        timeout-duration: 100s
      community-cb:
        timeout-duration: 100s
      search-cb:
        timeout-duration: 100s
      notification-cb:
        timeout-duration: 600s
        
logging:
  level:
    org.springframework.cloud.gateway: ${LOG_LEVEL:INFO}
    com.backend.gateway: DEBUG