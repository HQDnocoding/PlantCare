server:
  port: ${GATEWAY_PORT:8080}

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway
  cloud:
    gateway:
      # CORS is handled centrally here so individual services
      # do not need to configure it themselves
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            # false because mobile clients use Bearer token, not cookies
            allowCredentials: false
            maxAge: 3600

      routes:

        # ── Auth Service ───────────────────────────────────────────
        # Public endpoints — no JWT required
        - id: auth-public
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2
            # Rate limit: 100 req/s per IP — prevents OTP and login brute-force
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - AddRequestHeader=X-Forwarded-By, api-gateway
            # Open circuit after 50% failure rate, wait 30s before retrying
            - name: CircuitBreaker
              args:
                name: auth-cb
                fallbackUri: forward:/fallback/auth

        # ── Chat Service ───────────────────────────────────────────
        # Requires JWT — user_id is extracted from token and forwarded as X-User-Id
        - id: chat
          uri: ${CHAT_SERVICE_URL:http://chat-service:8000}
          predicates:
            - Path=/api/v1/chat/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - AddRequestHeader=X-Forwarded-By, api-gateway
            # Strip /api/v1 prefix — FastAPI router already handles /chat/**
#            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}
            - name: CircuitBreaker
              args:
                name: chat-cb
                fallbackUri: forward:/fallback/chat

        # ── History Service ────────────────────────────────────────
        # Shares the same downstream service and circuit breaker as chat
        - id: history
          uri: ${CHAT_SERVICE_URL:http://chat-service:8000}
          predicates:
            - Path=/api/v1/history/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 150
                redis-rate-limiter.burstCapacity: 300
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - AddRequestHeader=X-Forwarded-By, api-gateway
#            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}
            - name: CircuitBreaker
              args:
                name: chat-cb
                fallbackUri: forward:/fallback/chat

        # ── Diseases (Mobile Sync) ─────────────────────────────────
        # Public endpoint for mobile offline sync — no JWT required
        - id: diseases
          uri: ${CHAT_SERVICE_URL:http://chat-service:8000}
          predicates:
            - Path=/api/v1/diseases/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 150
                redis-rate-limiter.burstCapacity: 300
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - AddRequestHeader=X-Forwarded-By, api-gateway
            - name: CircuitBreaker
              args:
                name: chat-cb
                fallbackUri: forward:/fallback/diseases

        - id: scan
          uri: ${SCAN_SERVICE_URL:http://scan-service:8082}
          predicates:
            - Path=/api/v1/scans/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - AddRequestHeader=X-Forwarded-By, api-gateway
            - name: CircuitBreaker
              args:
                name: scan-cb
                fallbackUri: forward:/fallback/scan
        - id: user-service
          uri: ${USER_SERVICE_URL:http://user-service:8083}
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - AddRequestHeader=X-Forwarded-By, api-gateway
            - name: CircuitBreaker
              args:
