# Test Profile Configuration for Auth Service
spring.application.name=auth
server.port=0

# ===== Database (H2 in-memory) =====
spring.datasource.url=jdbc:h2:mem:authdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# ===== Logging =====
logging.level.com.backend.auth=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# ===== JWT =====
app.jwt.secret=test-secret-key-very-long-for-testing-purposes-minimum-256-bits
app.jwt.access-token-expiration-seconds=900
app.jwt.refresh-token-expiration-seconds=3600

# ===== OAuth2 (Test credentials) =====
app.oauth2.google.client-id=test-google-client-id.apps.googleusercontent.com
app.oauth2.facebook.app-id=test-facebook-app-id
app.oauth2.facebook.app-secret=test-facebook-app-secret

# ===== Kafka (TestContainers will handle this) =====
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=auth-service-test

# ===== Feign Client (disable External URLs) =====
feign.okhttp.enabled=true
user-service.url=http://localhost:8081
