spring:
  # Datasource URL is intentionally left empty here.
  # Testcontainers dynamically assigns the port when the container starts,
  # so the real URL is injected via @ServiceConnection in the test base class.
  # Spring Boot 3.1+ handles this automatically - no manual URL override needed.

  jpa:
    hibernate:
      # "validate": Flyway runs first with the real migration SQL,
      # then Hibernate checks Entity classes match the schema.
      # Same behavior as production - catches schema mismatches early.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    # ENABLED: run the real V1__init_auth_schema.sql during tests.
    # This verifies our migration SQL actually works, not just our Java code.
    enabled: true
    locations: classpath:db/migration

  # Redis is still @MockBean - no Testcontainers for Redis.
  # Idempotency logic is covered by unit tests separately.
  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

app:
  jwt:
    secret: test-secret-key-for-integration-tests-must-be-long!!
    access-token-expiration-seconds: 900
    refresh-token-expiration-seconds: 2592000

  oauth2:
    google:
      client-id: test-google-client-id
    facebook:
      app-id: test-facebook-app-id
      app-secret: test-facebook-app-secret

  idempotency:
    ttl-seconds: 86400

logging:
  level:
    com.agri.auth: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.testcontainers: WARN